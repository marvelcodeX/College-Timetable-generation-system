{% extends "base.html" %}

{% block title %}Login | Timetable Generator{% endblock %}

{% block content %}
<section style="padding-top: 100px;" class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-4"><i class="fas fa-sign-in-alt me-2"></i>Login</h3>
                        {% if form.errors %}
                        <div class="alert alert-danger">Your username and password didn't match. Please try again.</div>
                        {% endif %}
                        <form action="{% url 'login' %}" method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label">Username</label>
                                <input type="text" name="username" class="form-control" required autofocus>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" name="password" class="form-control" required>
                            </div>
                            <input type="hidden" name="next" value="{{ next }}" />
                            <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>
                        </form>
                        <p class="text-center mb-0"><small>Don't have an account? <a href="{% url 'register' %}">Register here</a></small></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
