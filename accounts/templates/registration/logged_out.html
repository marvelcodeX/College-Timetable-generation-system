{% extends "base.html" %}

{% block title %}Logged Out{% endblock %}

{% block content %}
<section style="padding-top: 100px;" class="py-5">
    <div class="container text-center">
        <div class="col-md-6 mx-auto">
            <i class="fas fa-sign-out-alt fa-3x text-muted mb-3"></i>
            <h2>Logged Out</h2>
            <p class="text-muted">You have been successfully logged out.</p>
            <a href="{% url 'login' %}" class="btn btn-primary me-2">Login Again</a>
            <a href="{% url 'index' %}" class="btn btn-outline-secondary">Home</a>
        </div>
    </div>
</section>
{% endblock %}
