{% extends "base.html" %}

{% block title %}Register | Timetable Generator{% endblock %}

{% block content %}
<section style="padding-top: 100px;" class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-4"><i class="fas fa-user-plus me-2"></i>Create Account</h3>
                        <form method="post">
                            {% csrf_token %}
                            {% for field in user_form %}
                            <div class="mb-3">
                                <label class="form-label">{{ field.label }}</label>
                                <input type="{{ field.field.widget.input_type|default:'text' }}"
                                       name="{{ field.html_name }}"
                                       class="form-control {% if field.errors %}is-invalid{% endif %}"
                                       value="{{ field.value|default:'' }}"
                                       {% if field.field.required %}required{% endif %}>
                                {% if field.errors %}<div class="invalid-feedback">{{ field.errors.0 }}</div>{% endif %}
                            </div>
                            {% endfor %}
                            <button type="submit" class="btn btn-primary w-100 mb-3">Create Account</button>
                        </form>
                        <p class="text-center mb-0"><small>Already have an account? <a href="{% url 'login' %}">Login here</a></small></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
